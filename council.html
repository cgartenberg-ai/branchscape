<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>THE COUNCIL — BRANCHSCAPE Act 2</title>
<link rel="stylesheet" href="vendor/fonts.css">
<link rel="stylesheet" href="vendor/maplibre-gl.css">
<script src="vendor/deck.gl.min.js"></script>
<script src="vendor/maplibre-gl.js"></script>
<script src="data/branches.js"></script>
<script src="data/income.js"></script>
<script src="data/cra_tract.js"></script>
<script src="data/tracts.js"></script>
<style>
  html,body{margin:0;height:100%;background:#02040a;color:#dfe8f5;font-family:'Inter',-apple-system,'Segoe UI',sans-serif;overflow:hidden}
  #map{position:fixed;inset:0}
  #hud{position:fixed;inset:0;pointer-events:none}
  .maplibregl-ctrl-attrib{display:none}
</style>
</head>
<body>
  <div id="map"></div>
  <div id="hud"></div>
  <script src="council/agents.js"></script>
  <script src="council/engine.js"></script>
  <script src="council/mandate.js"></script>
  <script src="council/script.js"></script>
  <script src="council/map.js"></script>
  <script src="council/ui.js"></script>
  <script src="council/director.js"></script>
  <script src="council/integration.browsercheck.js"></script>
  <script src="council/live.js"></script>
  <script src="council/setup.js"></script>
  <script>
    CouncilMap.initMap();
    CouncilUI.mount();
    const params = new URLSearchParams(location.search);

    // Phase 2: real agents streamed from council_server over SSE + the setup panel.
    function startLive() {
      const live = CouncilLive.connect({ onError: () => CouncilUI.setPhase('LIVE · connection lost') });
      window.__council = live; // presenter handle (also drives the setup panel)
      CouncilUI.setPhase('LIVE · ready');
      // Wire the "Redirect →" bar to the LIVE deliberation so the presenter / the room can
      // steer it mid-stream (in demo mode Director.wireControls does this; live had nothing).
      const sendRedirect = () => {
        const inp = document.getElementById('c-input');
        const v = inp.value.trim();
        if (v) { live.inject(v); inp.value = ''; inp.blur(); }
      };
      document.getElementById('c-send').addEventListener('click', sendRedirect);
      document.getElementById('c-input').addEventListener('keydown', e => {
        if (e.code === 'Enter') { e.preventDefault(); sendRedirect(); }
      });
      // Pick a bank archetype + mandate, then "Convene the council".
      // (Console fallback still works: __council.start("<mandate>", profile).)
      CouncilSetup.mount((mandate, profile) => {
        CouncilUI.setPhase('LIVE · convening…');
        live.start(mandate, profile).then(r => {
          if (r && r.status === 403) {
            CouncilUI.setPhase('LIVE · locked');
            CouncilUI.setActiveSpeaker('chair', '🔒 This is a presenter-gated link. Add the passcode to the URL (…/council.html?key=PASSCODE) to convene the council.');
          } else if (r && r.status === 429) {
            CouncilUI.setPhase('LIVE · busy');
            CouncilUI.setActiveSpeaker('chair', '⏳ The council is mid-deliberation for someone else. Give it a moment and convene again.');
          }
        }).catch(() => {});
      });
    }
    // Phase 1 deterministic, fully-local "demo" mode (the safe fallback floor).
    function startDemo() {
      Director.wireControls();
      Director.start('Open one new branch in Maricopa — balance deposit growth with community access');
    }

    // LIVE IS THE DEFAULT. `?demo` forces the canned demo (rehearsal / no-API safety).
    // Otherwise probe the server: real agents if council_server answers, else degrade
    // gracefully to the Phase-1 demo (so a bare URL "just works" on the laptop, and a
    // static host like GitHub Pages safely falls back instead of showing a dead page).
    // This removes the old `?live` footgun: losing the query string can never strand
    // the presenter in the canned demo while the real server is sitting right there.
    if (params.has('demo')) {
      startDemo();
    } else {
      CouncilUI.setPhase('LIVE · connecting…');
      fetch('health', { method: 'GET', cache: 'no-store' })
        .then(r => (r && r.ok) ? startLive() : startDemo())
        .catch(() => startDemo());
    }
  </script>
</body>
</html>
